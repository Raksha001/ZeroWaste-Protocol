<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-title { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 28px; font-weight: 700; text-anchor: middle; }
      .text-subtitle { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 500; text-anchor: middle; }
      .box-layer { fill: none; stroke: #30363d; stroke-width: 2; rx: 12; }
      .box-title { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; letter-spacing: 1.5px; text-transform: uppercase; }
      .box-bg { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 8; transition: all 0.3s ease; }
      .box-bg:hover { stroke: #58a6ff; }
      .text-main { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 600; text-anchor: middle; }
      .text-desc { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 400; text-anchor: middle; }
      .line { fill: none; stroke: #484f58; stroke-width: 2; stroke-dasharray: 4 4; }
      .arrow { fill: none; stroke: #58a6ff; stroke-width: 2; marker-end: url(#arrowhead); }
      .badge-bg { fill: #1f6feb; rx: 10; }
      .badge-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
      .skill-okx { stroke: #238636; }
      .skill-ai { stroke: #8957e5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
    </marker>
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a1b41" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="grad-okx" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f2a1b" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="850" rx="16" />

  <!-- Header -->
  <text x="450" y="55" class="text-title">ZeroWaste Protocol</text>
  <text x="450" y="80" class="text-subtitle">Autonomous x402 Web3 Payment Agent</text>

  <!-- Layer 1: Interface -->
  <rect x="50" y="110" width="800" height="100" class="box-layer" />
  <text x="450" y="130" class="box-title">User Interface</text>
  
  <rect x="350" y="145" width="200" height="50" class="box-bg" />
  <text x="450" y="170" class="text-main">Telegram Bot</text>
  <text x="450" y="188" class="text-desc">Natural Language Input</text>
  
  <path d="M 450 210 L 450 240" class="arrow" />

  <!-- Layer 2: AI Processing -->
  <rect x="50" y="250" width="800" height="100" class="box-layer" />
  <text x="450" y="270" class="box-title">AI Intent Engine</text>
  
  <rect x="300" y="285" width="300" height="50" class="box-bg skill-ai" style="fill: url(#grad-ai);" />
  <text x="450" y="310" class="text-main">Groq LLaMA 3.3 70B</text>
  <text x="450" y="328" class="text-desc">Parses URLs &amp; Intents</text>
  
  <path d="M 450 350 L 450 380" class="arrow" />

  <!-- Layer 3: OKX Onchain Core Skills -->
  <rect x="50" y="390" width="800" height="150" class="box-layer" />
  <text x="450" y="410" class="box-title">Intelligence &amp; Routing (OKX Skills)</text>
  
  <!-- Skill 1 -->
  <rect x="70" y="430" width="175" height="90" class="box-bg skill-okx" style="fill: url(#grad-okx);" />
  <text x="157" y="460" class="text-main">Wallet Portfolio</text>
  <text x="157" y="480" class="text-desc">Scans agent wallet</text>
  <text x="157" y="500" class="text-desc">for dust tokens</text>
  <rect x="75" y="435" width="60" height="20" class="badge-bg" /><text x="105" y="449" class="badge-text" style="font-size:10px;">sk-portfolio</text>
  
  <!-- Skill 2 -->
  <rect x="265" y="430" width="175" height="90" class="box-bg skill-okx" style="fill: url(#grad-okx);" />
  <text x="352" y="460" class="text-main">Security</text>
  <text x="352" y="480" class="text-desc">Filters risk tokens</text>
  <text x="352" y="500" class="text-desc">&amp; simulates txs</text>
  <rect x="270" y="435" width="60" height="20" class="badge-bg" /><text x="300" y="449" class="badge-text" style="font-size:10px;">sk-security</text>
  
  <!-- Skill 3 -->
  <rect x="460" y="430" width="175" height="90" class="box-bg skill-okx" style="fill: url(#grad-okx);" />
  <text x="547" y="460" class="text-main">DEX Token</text>
  <text x="547" y="480" class="text-desc">Enriches live</text>
  <text x="547" y="500" class="text-desc">DEX quotes</text>
  <rect x="465" y="435" width="60" height="20" class="badge-bg" /><text x="495" y="449" class="badge-text" style="font-size:10px;">sk-dex-token</text>
  
  <!-- Skill 4 -->
  <rect x="655" y="430" width="175" height="90" class="box-bg skill-okx" style="fill: url(#grad-okx);" />
  <text x="742" y="460" class="text-main">DEX Swap</text>
  <text x="742" y="480" class="text-desc">Computes optimal</text>
  <text x="742" y="500" class="text-desc">sweep routes</text>
  <rect x="660" y="435" width="60" height="20" class="badge-bg" /><text x="690" y="449" class="badge-text" style="font-size:10px;">sk-dex-swap</text>

  <path d="M 450 540 L 450 570" class="arrow" />

  <!-- Layer 4: Execution -->
  <rect x="50" y="580" width="800" height="110" class="box-layer" />
  <text x="450" y="600" class="box-title">Execution &amp; Verification</text>

  <rect x="70" y="620" width="175" height="50" class="box-bg skill-okx" />
  <text x="157" y="645" class="text-main">Agent Wallet</text>
  <text x="157" y="663" class="text-desc">onchainos CLI signing</text>

  <rect x="270" y="620" width="165" height="50" class="box-bg skill-okx" />
  <text x="352" y="645" class="text-main">x402 Protocol</text>
  <text x="352" y="663" class="text-desc">Paywall HTTP handling</text>

  <rect x="465" y="620" width="165" height="50" class="box-bg skill-okx" />
  <text x="547" y="645" class="text-main">Onchain Gateway</text>
  <text x="547" y="663" class="text-desc">Tx broadcast tracking</text>

  <rect x="655" y="620" width="175" height="50" class="box-bg skill-okx" />
  <text x="742" y="645" class="text-main">Audit Log</text>
  <text x="742" y="663" class="text-desc">Immutable sweep history</text>

  <path d="M 450 690 L 450 720" class="arrow" />

  <!-- Layer 5: Blockchain -->
  <rect x="50" y="730" width="800" height="90" class="box-layer" style="stroke: #e36a00;" />
  <text x="450" y="750" class="box-title" style="fill: #ffaa00;">X Layer Mainnet (Chain ID: 196)</text>
  
  <rect x="150" y="765" width="200" height="40" class="box-bg" style="stroke: #e36a00;" />
  <text x="250" y="790" class="text-main">DustSweeper Swaps</text>
  
  <path d="M 350 785 L 550 785" class="arrow" />
  <text x="450" y="775" class="text-desc">USDT</text>

  <rect x="550" y="765" width="200" height="40" class="box-bg" style="stroke: #e36a00;" />
  <text x="650" y="790" class="text-main">x402 Merchant</text>

  <!-- Decoration -->
  <text x="450" y="840" class="text-desc">Powered by 8 OKX Onchain OS Skills</text>
</svg>
